<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Village Memory Match</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #0f0e17; --paper: #f5f2eb; --accent: #ff5c00; --soft: #e8e3d9; --white: #ffffff; }

    body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem 3rem; }

    header { text-align: center; margin-bottom: 1rem; }
    header h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 800; letter-spacing: -0.03em; }
    header h1 span { color: var(--accent); }
    header p { margin-top: 0.4rem; font-size: 0.9rem; color: #555; }

    .stats { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .pill { background: var(--ink); color: var(--white); font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; padding: 0.35rem 1rem; border-radius: 999px; letter-spacing: 0.05em; }
    .pill span { color: var(--accent); }

    /* The game board holds the background image and all cards positioned on top */
    .board {
      position: relative;
      width: 100%;
      max-width: 760px;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 30px rgba(0,0,0,0.15);
      background-size: cover;
      background-position: center;
    }

    /* Each card is absolutely positioned using percentages so it scales with the board */
    .card {
      position: absolute;
      cursor: pointer;
      perspective: 600px;
      transition: transform 0.2s;
    }
    .card:hover { transform: scale(1.08); z-index: 20; }

    .card-inner {
      position: relative;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }

    .card-back, .card-front {
      position: absolute;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .card-back {
      background: rgba(15,14,23,0.82);
      backdrop-filter: blur(1px);
      flex-direction: column;
    }
    .card-back .qmark { font-size: 1.1rem; color: var(--accent); font-weight: 800; font-family: 'Syne', sans-serif; }

    .card-front { transform: rotateY(180deg); background: var(--white); }
    .card-front.picture img { width: 100%; height: 100%; object-fit: cover; }
    .card-front.word { background: var(--accent); flex-direction: column; padding: 2px; }
    .card-front.word .word-text {
      font-family: 'Syne', sans-serif; font-weight: 800; color: white;
      text-transform: uppercase; text-align: center; line-height: 1;
      font-size: clamp(0.4rem, 1.6vw, 0.85rem);
      word-break: break-word; overflow-wrap: break-word; width: 100%;
    }
    .card.matched .card-front { border-color: #2ecc71; box-shadow: 0 0 0 2px #2ecc71, 0 2px 8px rgba(0,0,0,0.3); }

    .controls { margin-top: 1.2rem; display: flex; gap: 0.8rem; }
    .btn { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; padding: 0.6rem 1.4rem; border-radius: 999px; cursor: pointer; border: 2px solid var(--soft); background: transparent; color: var(--ink); transition: border-color 0.2s; }
    .btn:hover { border-color: var(--ink); }
    .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }

    .win-box { display: none; position: fixed; inset: 0; background: rgba(15,14,23,0.7); align-items: center; justify-content: center; z-index: 100; }
    .win-box.show { display: flex; }
    .win-inner { background: var(--white); border-radius: 20px; padding: 2.5rem 2rem; text-align: center; max-width: 360px; }
    .win-inner .trophy { font-size: 3rem; }
    .win-inner h2 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; margin: 0.5rem 0; }
    .win-inner p { color: #555; margin-bottom: 1.2rem; }
    .win-inner button { font-family: 'Syne', sans-serif; font-weight: 700; padding: 0.8rem 2rem; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; }

    .hint-note { margin-top: 0.8rem; font-size: 0.8rem; color: #999; text-align: center; max-width: 500px; }
  </style>
</head>
<body>

  <header>
    <h1>Village <span>Match</span></h1>
    <p>Find the cards hidden in the village — match each picture to its word</p>
  </header>

  <div class="stats">
    <div class="pill">Moves: <span id="moves">0</span></div>
    <div class="pill">Matches: <span id="matches">0</span> / 4</div>
    <div class="pill">Time: <span id="timer">0s</span></div>
  </div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button class="btn primary" onclick="initGame()">↺ New Game</button>
    <button class="btn" onclick="peek()">👁 Peek</button>
  </div>
  <p class="hint-note">Tip: cards are tucked into rooftops, trees and corners. Hover to spot them, then click to flip!</p>

  <div class="win-box" id="winBox">
    <div class="win-inner">
      <div class="trophy">🏆</div>
      <h2>You found them all!</h2>
      <p id="winMessage"></p>
      <button onclick="initGame()">Play Again</button>
    </div>
  </div>

  <script>
    // ---- YOUR WORD / IMAGE PAIRS ----
    const pairs = [
      { word: 'tree',      image: 'Pictures/tree.png' },
      { word: 'ladybird',  image: 'Pictures/ladybird.png' },
      { word: 'waterfall', image: 'Pictures/waterfall.png' },
      { word: 'ant',       image: 'Pictures/ant.png' },
    ];

    // Background image
    const backgroundImage = 'Backgrounds/Background Village.png';

    // ---- HIDING SPOTS (positioned on interesting image features) ----
    // Values are % positions on the board. size is % width (square).
    // 8 spots for 8 cards (4 pictures + 4 words). Varied sizes.
    const hidingSpots = [
      { left: 11, top: 8,  size: 9  },  // top-left green tree foliage
      { left: 19, top: 27, size: 8  },  // domed tower roof
      { left: 42, top: 17, size: 7  },  // orange rooftop upper-middle
      { left: 78, top: 50, size: 10 },  // market stall awning (right)
      { left: 8,  top: 56, size: 9  },  // lower-left red tiled roof
      { left: 80, top: 84, size: 8  },  // bottom-right hut roof
      { left: 50, top: 60, size: 7  },  // plaza ground (centre, trickier)
      { left: 64, top: 38, size: 8  },  // stone house roof (right-middle)
    ];
    // ----------------------------------------------------------------

    let flipped = [], matched = 0, moves = 0, locked = false;
    let timerInterval, seconds = 0, gameStarted = false;

    function initGame() {
      flipped = []; matched = 0; moves = 0; locked = false;
      seconds = 0; gameStarted = false;
      clearInterval(timerInterval);
      document.getElementById('moves').textContent = 0;
      document.getElementById('matches').textContent = 0;
      document.getElementById('timer').textContent = '0s';
      document.getElementById('winBox').className = 'win-box';

      const board = document.getElementById('board');
      board.style.backgroundImage = `url('${backgroundImage}')`;
      board.innerHTML = '';

      // Build deck: a picture card + a word card per pair
      let cards = [];
      pairs.forEach((pair, i) => {
        cards.push({ type: 'picture', pairId: i, pair });
        cards.push({ type: 'word',    pairId: i, pair });
      });
      cards.sort(() => Math.random() - 0.5);

      // Shuffle which spot each card goes to
      const spots = [...hidingSpots].sort(() => Math.random() - 0.5);

      cards.forEach((card, index) => {
        const spot = spots[index];
        const el = document.createElement('div');
        el.className = 'card';
        el.dataset.pairId = card.pairId;
        el.style.left = spot.left + '%';
        el.style.top = spot.top + '%';
        el.style.width = spot.size + '%';
        el.style.aspectRatio = '1 / 1';  // keeps it square

        const inner = document.createElement('div');
        inner.className = 'card-inner';

        const back = document.createElement('div');
        back.className = 'card-back';
        back.innerHTML = '<div class="qmark">?</div>';

        const front = document.createElement('div');
        if (card.type === 'picture') {
          front.className = 'card-front picture';
          const img = document.createElement('img');
          img.src = card.pair.image;
          img.alt = card.pair.word;
          front.appendChild(img);
        } else {
          front.className = 'card-front word';
          front.innerHTML = `<div class="word-text">${card.pair.word}</div>`;
        }

        inner.appendChild(back);
        inner.appendChild(front);
        el.appendChild(inner);
        el.addEventListener('click', () => flipCard(el));
        board.appendChild(el);
      });
    }

    function flipCard(el) {
      if (locked) return;
      if (el.classList.contains('flipped') || el.classList.contains('matched')) return;
      if (flipped.length === 2) return;

      if (!gameStarted) {
        gameStarted = true;
        timerInterval = setInterval(() => {
          seconds++;
          document.getElementById('timer').textContent = seconds + 's';
        }, 1000);
      }

      el.classList.add('flipped');
      flipped.push(el);

      if (flipped.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        locked = true;
        setTimeout(checkMatch, 800);
      }
    }

    function checkMatch() {
      const [a, b] = flipped;
      if (a.dataset.pairId === b.dataset.pairId) {
        a.classList.add('matched');
        b.classList.add('matched');
        matched++;
        document.getElementById('matches').textContent = matched;
        if (matched === pairs.length) {
          clearInterval(timerInterval);
          setTimeout(showWin, 500);
        }
      } else {
        a.classList.remove('flipped');
        b.classList.remove('flipped');
      }
      flipped = [];
      locked = false;
    }

    // Briefly reveal all cards to help players locate them
    function peek() {
      if (locked) return;
      const cards = document.querySelectorAll('.card:not(.matched)');
      cards.forEach(c => c.classList.add('flipped'));
      locked = true;
      setTimeout(() => {
        cards.forEach(c => { if (!c.classList.contains('matched')) c.classList.remove('flipped'); });
        locked = false;
        flipped = [];
      }, 1000);
    }

    function showWin() {
      document.getElementById('winBox').className = 'win-box show';
      document.getElementById('winMessage').textContent =
        `You finished in ${moves} moves and ${seconds} seconds!`;
    }

    initGame();
  </script>
</body>
</html>
